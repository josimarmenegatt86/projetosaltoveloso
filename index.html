<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Trabalhos dos Alunos - Programação de Sistemas de Informação</title>
  <style>
    /* Reset básico */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f0f4f8, #d9e4ec);
      color: #333;
      padding: 40px;
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      color: #222;
      margin-bottom: 40px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      padding: 25px;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.15);
    }

    .card h2 {
      font-size: 1.2rem;
      margin-bottom: 15px;
      color: #444;
    }

    .card a {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 6px;
      background: #0077cc;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .card a:hover {
      background: #005fa3;
    }
  </style>
</head>
<body>
  <h1>Trabalhos dos Alunos</h1>
  <div class="container">
    <div class="card">
      <h2>Aluno 1</h2>
      <a href="https://github.com/aluno1" target="_blank">Ver Perfil</a>
    </div>
    <div class="card">
      <h2>Aluno 2</h2>
      <a href="https://github.com/aluno2" target="_blank">Ver Perfil</a>
    </div>
    <div class="card">
      <h2>Aluno 3</h2>
      <a href="https://github.com/aluno3" target="_blank">Ver Perfil</a>
    </div>
    <!-- Repita para os 30 alunos -->
  </div>
</body>
</html>
