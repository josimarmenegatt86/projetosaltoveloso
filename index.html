<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Trabalhos dos Alunos - Programação de Sistemas de Informação</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      padding: 15px;
      text-align: center;
      transition: transform 0.2s;
    }
    .card:hover {
      transform: scale(1.05);
    }
    .card a {
      text-decoration: none;
      color: #0077cc;
      font-weight: bold;
    }
    .card a:hover {
      color: #005fa3;
    }
  </style>
</head>
<body>
  <h1>Trabalhos dos Alunos</h1>
  <div class="container">
    <div class="card">
      <p>Aluno 1</p>
      <a href="https://github.com/aluno1" target="_blank">Ver Perfil</a>
    </div>
    <div class="card">
      <p>Aluno 2</p>
      <a href="https://github.com/aluno2" target="_blank">Ver Perfil</a>
    </div>
    <div class="card">
      <p>Aluno 3</p>
      <a href="https://github.com/aluno3" target="_blank">Ver Perfil</a>
    </div>
    <!-- Repita para os 30 alunos -->
  </div>
</body>
</html>
